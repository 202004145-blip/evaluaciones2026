<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Panel del evaluador · IPV PRADEVA</title>
<link rel="stylesheet" href="/shared/estilos.css">
<link rel="stylesheet" href="estilos.css">
</head>
<body>
<div class="shell">

  <!-- LOGIN -->
  <div id="loginView" class="active">
    <div class="login-wrap">
      <div class="card">
        <div class="kicker">Panel del evaluador · IPV</div>
        <h2>Iniciar sesión</h2>
        <label class="field-label" for="loginUser">Usuario</label>
        <input type="text" id="loginUser" autocomplete="username">
        <label class="field-label" for="loginPass">Contraseña</label>
        <input type="password" id="loginPass" autocomplete="current-password">
        <div class="login-error" id="loginError"></div>
        <div class="btn-row">
          <button class="btn" id="btnLogin">Entrar</button>
          <a class="btn ghost" href="/ipv/evaluado/" style="text-decoration:none;">← Volver al test</a>
        </div>
      </div>
    </div>
  </div>

  <!-- LISTA DE EVALUADOS -->
  <div id="listView">
    <header class="admin-head">
      <h2>Resultados IPV</h2>
      <div class="masthead-right">
        <span class="eyebrow" id="usuarioActual"></span>
        <button class="admin-btn" id="btnLogout">Cerrar sesión</button>
      </div>
    </header>
    <div id="listaResultados"></div>
  </div>

  <!-- DETALLE -->
  <div id="detailView">
    <header class="admin-head no-print">
      <button class="admin-btn" id="btnVolverLista">← Volver a la lista</button>
      <div class="masthead-right">
        <button class="admin-btn" onclick="window.print()">Imprimir</button>
        <button class="admin-btn" id="btnLogout2">Cerrar sesión</button>
      </div>
    </header>
    <div id="detalleContenido"></div>
  </div>

</div>
<script src="login.js"></script>
<script src="panel.js"></script>
</body>
</html>
